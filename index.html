<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SERO AI</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#4F46E5,#7C3AED);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.card{
background:rgba(255,255,255,.12);
backdrop-filter:blur(10px);
padding:35px;
border-radius:22px;
text-align:center;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

h1{
margin:0;
font-size:36px;
}

p{
opacity:.9;
margin:15px 0 25px;
}

button{
background:white;
color:#4F46E5;
border:none;
padding:14px 30px;
font-size:18px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}
</style>

</head>

<body>

<div class="card">
<h1>🤖 SERO AI</h1>
<p>The next generation AI assistant</p>

<button onclick="alert('Welcome to SERO AI!')">
Start
</button>

</div>

</body>
</html>
